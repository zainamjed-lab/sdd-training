<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — SDD Training</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="card">
    <h1 class="card-title">Create account</h1>
    <p class="card-subtitle">Get started — it's free</p>

    <div id="error-box" class="alert alert-error hidden" role="alert" aria-live="assertive"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          placeholder="you@example.com"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            required
            placeholder="At least 8 characters"
          />
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">Show</button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm password</label>
        <input
          type="password"
          id="confirm-password"
          name="confirm-password"
          autocomplete="new-password"
          required
          placeholder="Repeat your password"
        />
      </div>

      <button type="submit" class="btn btn-primary" id="submit-btn">Create Account</button>
    </form>

    <button class="btn btn-ghost" onclick="location.href='/login.html'">
      Already have an account? Sign in
    </button>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
