<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — SDD Training</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="card">
    <h1 class="card-title">Welcome back</h1>
    <p class="card-subtitle">Sign in to your account</p>

    <div id="error-box" class="alert alert-error hidden" role="alert" aria-live="assertive"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required
          placeholder="you@example.com"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
            placeholder="••••••••"
          />
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">Show</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="submit-btn">Sign In</button>
    </form>

    <button class="btn btn-ghost" onclick="location.href='/register.html'">
      Don't have an account? Register
    </button>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
